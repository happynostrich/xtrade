# xtrade testnet venues — split layout (Phase 3.5+).
#
# As of Phase 3.5, the testnet venues live in three per-venue yamls so
# `xtrade live health` can iterate one TradingNode per venue without
# tripping Nautilus's per-process Venue collision (both Binance spot
# and futures register under `Venue('BINANCE')` in the
# ExecutionEngine, so they cannot share a node):
#
#   - config/venues.binance_spot.testnet.yaml
#   - config/venues.binance_futures.testnet.yaml
#   - config/venues.hyperliquid.testnet.yaml
#
# `xtrade live health` and the runbook scripts auto-discover those
# files via the convention `venues.<venue_key>.testnet.yaml` next to
# this pointer. For single-venue invocations you can still pass
# `--venues-yaml config/venues.<venue_key>.testnet.yaml` explicitly.
#
# This file intentionally has no top-level venue keys so loading it
# raises `ConfigError` — operators should not pass this path directly.
