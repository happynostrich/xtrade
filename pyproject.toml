[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "xtrade"
version = "0.0.1"
description = "xtrade — multi-venue automated trading research project (Phase 0)"
readme = "README.md"
requires-python = ">=3.12,<3.15"
license = { text = "Proprietary" }
authors = [{ name = "xtrade" }]

# Phase 0 dependencies are intentionally minimal.
# NautilusTrader is the engine; httpx is used for the raw Hyperliquid
# info-endpoint enumeration in Task D (no SDK needed).
dependencies = [
    "nautilus_trader>=1.227",
    "python-dotenv>=1.0",
    "httpx>=0.27",
    "pandas>=2.2",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"
